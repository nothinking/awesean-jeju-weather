<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>awesean-jeju-weather</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 100%);
    border-bottom: 2px solid #00b4d8;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 20px rgba(0,180,216,0.15);
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-icon {
    width: 36px; height: 36px;
    background: #00b4d8;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px; }
  .header h1 span { color: #00b4d8; }
  .header-right { display: flex; align-items: center; gap: 18px; font-size: 13px; color: #8899aa; }
  .live-dot {
    width: 8px; height: 8px; background: #ff4444; border-radius: 50%;
    display: inline-block; animation: pulse 1.5s infinite; margin-right: 5px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,68,68,0.7); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(255,68,68,0); }
  }
  #clock { font-family: 'Courier New', monospace; font-size: 15px; color: #00b4d8; font-weight: bold; }

  /* ── Tab Navigation (모바일 전용) ── */
  .tab-nav {
    display: none;
    background: #0d1b2a;
    padding: 0 24px;
    border-bottom: 1px solid #1a2a3a;
    position: sticky; top: 56px; z-index: 99;
  }
  .tab-btn {
    background: none; border: none; color: #667;
    padding: 10px 20px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    border-bottom: 2px solid transparent;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-btn:hover { color: #aab; }
  .tab-btn.active { color: #00b4d8; border-bottom-color: #00b4d8; }
  .tab-btn .tab-icon { font-size: 15px; }

  /* ── Controls bar ── */
  .controls {
    background: #0d1b2a;
    padding: 8px 24px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #1a2a3a;
    flex-wrap: wrap;
  }
  .controls label { font-size: 11px; color: #8899aa; text-transform: uppercase; letter-spacing: 1px; }
  .filter-btn {
    background: #1a2a3a; border: 1px solid #2a3a4a; color: #ccc;
    padding: 5px 12px; border-radius: 4px; font-size: 11px;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: #00b4d8; color: #00b4d8; }
  .filter-btn.active { background: #00b4d8; color: #fff; border-color: #00b4d8; }
  .layout-btns { margin-left: auto; display: flex; gap: 5px; align-items: center; }
  .layout-btn {
    background: #1a2a3a; border: 1px solid #2a3a4a; color: #ccc;
    padding: 5px 9px; border-radius: 4px; font-size: 11px;
    cursor: pointer; transition: all 0.2s;
  }
  .layout-btn:hover { border-color: #00b4d8; color: #00b4d8; }
  .layout-btn.active { background: #00b4d8; color: #fff; border-color: #00b4d8; }

  /* ── Weather Section ── */
  .weather-area {
    border-bottom: 1px solid #1a2a3a;
  }
  .weather-section {
    padding: 4px;
    display: grid;
    gap: 4px;
  }
  .weather-section {
    grid-template-columns: 1fr 1fr 1fr;
    height: 35vh;
  }
  .weather-card {
    background: #111a28;
    border: 1px solid #1a2a3a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }
  .weather-card:hover { border-color: #00b4d8; }
  .weather-card-label {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%);
    padding: 10px 14px;
    z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
  }
  .weather-card-title {
    font-size: 13px; font-weight: 700; color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    display: flex; align-items: center; gap: 8px;
  }
  .weather-card-title .w-icon { font-size: 16px; }
  .weather-card-badge {
    font-size: 10px; color: #ffd700;
    background: rgba(255,215,0,0.12); padding: 2px 8px;
    border-radius: 10px; border: 1px solid rgba(255,215,0,0.3);
  }
  .weather-card iframe {
    width: 100%; height: 100%; border: none;
  }


  /* ── CCTV Grid ── */
  .grid {
    display: grid;
    gap: 4px;
    padding: 4px;
    grid-template-columns: repeat(4, 1fr);
  }
  .grid.layout-1x1 { grid-template-columns: 1fr; }
  .grid.layout-2x2 { grid-template-columns: repeat(2, 1fr); }
  .grid.layout-3x3 { grid-template-columns: repeat(3, 1fr); }
  .grid.layout-4x4 { grid-template-columns: repeat(4, 1fr); }

  /* ── Camera Card ── */
  .cam-card {
    background: #111a28;
    border: 1px solid #1a2a3a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .cam-card:hover { border-color: #00b4d8; box-shadow: 0 0 15px rgba(0,180,216,0.2); }
  .cam-card.expanded {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1000; border-radius: 0; border: none;
  }
  .cam-label {
    position: absolute; top: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    padding: 8px 10px; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
  }
  .cam-name { font-size: 12px; font-weight: 600; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  .cam-region {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
  }
  .cam-status {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    padding: 8px 10px; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
  }
  .cam-live {
    font-size: 10px; color: #ff4444; font-weight: bold;
    display: flex; align-items: center; gap: 4px;
  }
  .cam-live .dot { width: 6px; height: 6px; background: #ff4444; border-radius: 50%; animation: pulse 1.5s infinite; }
  .cam-source { font-size: 9px; color: #667; }
  .cam-media {
    width: 100%; height: 100%; min-height: 180px;
    display: flex; align-items: center; justify-content: center; background: #0a0e17;
  }
  .cam-media img, .cam-media video { width: 100%; height: 100%; object-fit: cover; }
  .cam-media .loading { color: #334; font-size: 12px; text-align: center; }
  .cam-media .error-msg { color: #664444; font-size: 11px; text-align: center; padding: 10px; }

  /* ── Fullscreen overlay ── */
  .close-overlay {
    position: fixed; top: 10px; right: 10px; z-index: 1001;
    background: rgba(0,0,0,0.8); border: 1px solid #00b4d8; color: #fff;
    padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px;
    display: none;
  }
  .close-overlay.visible { display: block; }

  /* ═══════════════════════════════════════
     MOBILE RESPONSIVE (max-width: 768px)
     ═══════════════════════════════════════ */
  @media (max-width: 768px) {
    /* ── Header ── */
    .header { padding: 8px 12px; }
    .header-icon { width: 30px; height: 30px; font-size: 15px; }
    .header h1 { font-size: 14px; letter-spacing: 0; }
    .header-left { gap: 8px; }
    .header-right { gap: 10px; font-size: 11px; }
    #clock { font-size: 12px; }
    #cam-count { display: none; }

    /* ── Tabs: 모바일에서만 표시 ── */
    .tab-nav {
      display: flex;
      padding: 0 8px; top: 46px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .tab-btn { padding: 8px 12px; font-size: 12px; gap: 4px; white-space: nowrap; }
    .tab-btn .tab-icon { font-size: 13px; }

    /* ── 모바일 섹션 전환 ── */
    .weather-area { display: none; }
    .cctv-area { display: none; }
    .weather-area.mobile-active { display: block; }
    .cctv-area.mobile-active { display: block; }

    /* ── Controls ── */
    .controls { padding: 6px 10px; gap: 6px; }
    .controls label { font-size: 10px; }
    .filter-btn { padding: 5px 8px; font-size: 10px; }
    .layout-btns { margin-left: 0; margin-top: 4px; width: 100%; }
    .layout-btn { padding: 5px 8px; font-size: 10px; }

    /* ── Weather section: 모바일 1단 ── */
    .weather-section {
      grid-template-columns: 1fr;
      height: auto;
    }
    .weather-section .weather-card { min-height: 200px; }

    /* ── Camera card (기본 모바일) ── */
    .cam-media { min-height: 220px; }

    /* ── CCTV Grid: 모바일에서도 선택한 레이아웃 유지 ── */
    .grid { grid-template-columns: 1fr; }
    .grid.layout-1x1 { grid-template-columns: 1fr; }
    .grid.layout-2x2 { grid-template-columns: repeat(2, 1fr); }
    .grid.layout-2x2 .cam-media { min-height: 140px; }
    .grid.layout-3x3 { grid-template-columns: repeat(3, 1fr); }
    .grid.layout-3x3 .cam-media { min-height: 100px; }
    .grid.layout-3x3 .cam-name { font-size: 10px; }
    .grid.layout-3x3 .cam-region { font-size: 9px; }
    .grid.layout-3x3 .cam-status { display: none; }
    .grid.layout-4x4 { grid-template-columns: repeat(4, 1fr); }
    .grid.layout-4x4 .cam-media { min-height: 80px; }
    .grid.layout-4x4 .cam-name { font-size: 9px; }
    .grid.layout-4x4 .cam-region { display: none; }
    .grid.layout-4x4 .cam-status { display: none; }
    .cam-label { padding: 10px 12px; }
    .cam-name { font-size: 13px; }
    .cam-region { font-size: 11px; padding: 3px 10px; }
    .cam-status { padding: 10px 12px; }
    .cam-live { font-size: 11px; }
    .cam-source { font-size: 10px; }

    /* ── Fullscreen close button ── */
    .close-overlay { padding: 10px 20px; font-size: 16px; }
  }

  /* ═══════════════════════════════════════
     TABLET RESPONSIVE (max-width: 1024px)
     ═══════════════════════════════════════ */
  @media (min-width: 769px) and (max-width: 1024px) {
    .grid.layout-4x4 { grid-template-columns: repeat(3, 1fr); }
    .grid.layout-3x3 { grid-template-columns: repeat(2, 1fr); }
  }

  /* ═══════════════════════════════════════
     SMALL MOBILE (max-width: 480px)
     ═══════════════════════════════════════ */
  @media (max-width: 480px) {
    .header h1 { font-size: 13px; }
    .header-icon { width: 28px; height: 28px; font-size: 14px; border-radius: 6px; }
    .header-right > span:not(:first-child):not(#clock) { display: none; }
    .tab-btn { padding: 7px 10px; font-size: 11px; }
    .cam-media { min-height: 200px; }
    .filter-btn { padding: 4px 7px; font-size: 9px; }
    .grid.layout-3x3 .cam-media { min-height: 80px; }
    .grid.layout-3x3 .cam-name { font-size: 9px; }
    .grid.layout-4x4 .cam-media { min-height: 60px; }
    .grid.layout-4x4 .cam-name { font-size: 8px; }
    .weather-section .weather-card { min-height: 170px; }
  }
</style>
</head>

const regionColors = {
  "제주 북부지역": "#00b4d8",
  "제주 남부지역": "#48bb78",
  "제주 동부지역": "#ed8936",
  "제주 서부지역": "#9f7aea",
  "한라산": "#f56565"
};

let currentFilter = "all";
let expandedCard = null;
const hlsInstances = {};

/* ═══ Clock ═══ */
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ═══ Mobile tab switching ═══ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    const weatherEl = document.getElementById('section-weather');
    const cctvEl = document.getElementById('section-cctv');
    weatherEl.classList.toggle('mobile-active', tab === 'weather');
    cctvEl.classList.toggle('mobile-active', tab === 'cctv');
  });
});

/* ═══ Render CCTV into a grid container ═══ */
function renderCameras(gridEl, cameraList) {
  gridEl.innerHTML = '';
  cameraList.forEach(cam => {
    const card = document.createElement('div');
    card.className = 'cam-card';
    card.id = 'cam-' + cam.id;
    const color = regionColors[cam.region] || '#00b4d8';
    card.innerHTML = `
      <div class="cam-label">
        <span class="cam-name">${cam.name}</span>
        <span class="cam-region" style="color:${color};background:${color}22;border:1px solid ${color}44">${cam.region}</span>
      </div>
      <div class="cam-media" id="media-${cam.id}">
        <div class="loading">연결 중...</div>
      </div>
      <div class="cam-status">
        <span class="cam-live"><span class="dot"></span> LIVE</span>
        <span class="cam-source">${cam.source}</span>
      </div>
    `;
    card.addEventListener('dblclick', () => toggleExpand(cam.id));
    // Mobile: double-tap to expand
    let tapTimeout;
    card.addEventListener('touchend', (e) => {
      if (e.target.closest('.cam-expand-btn')) return;
      if (tapTimeout) { clearTimeout(tapTimeout); tapTimeout = null; toggleExpand(cam.id); }
      else { tapTimeout = setTimeout(() => { tapTimeout = null; }, 300); }
    });
    gridEl.appendChild(card);
    setTimeout(() => loadStream(cam), 100);
  });
}

function renderCCTV() {
  const grid = document.getElementById('grid-combined');
  const filtered = currentFilter === 'all' ? cameras : currentFilter === '해수욕장' ? cameras.filter(c => c.source === '해수욕장') : cameras.filter(c => c.region === currentFilter);
  renderCameras(grid, filtered);
  document.getElementById('cam-count').textContent = filtered.length + ' 카메라';
}

/* ═══ Stream loading ═══ */
function loadStream(cam) {
  const container = document.getElementById('media-' + cam.id);
  if (!container) return;
  if (cam.type === 'mjpg') {
    const img = document.createElement('img');
    img.src = cam.url;
    img.alt = cam.name;
    img.onerror = () => { if (cam.hls) loadHLS(cam, container); else container.innerHTML = `<div class="error-msg">연결 실패<br><small>${cam.name}</small></div>`; };
    container.innerHTML = '';
    container.appendChild(img);
  } else {
    loadHLS(cam, container);
  }
}

function loadHLS(cam, container) {
  const video = document.createElement('video');
  video.muted = true; video.autoplay = true; video.playsInline = true;
  const hlsUrl = cam.hls || cam.url;

  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true, lowLatencyMode: true, maxBufferLength: 10, maxMaxBufferLength: 30 });
    hls.loadSource(hlsUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        if (hlsUrl === cam.hls && cam.url !== cam.hls) {
          hls.destroy();
          const hls2 = new Hls({ enableWorker: true });
          hls2.loadSource(cam.url); hls2.attachMedia(video);
          hls2.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
          hls2.on(Hls.Events.ERROR, () => { container.innerHTML = `<div class="error-msg">연결 실패<br><small>${cam.name}</small></div>`; });
          hlsInstances[cam.id] = hls2;
        } else if (cam.url.includes('axis-cgi')) {
          const img = document.createElement('img'); img.src = cam.url; img.alt = cam.name;
          container.innerHTML = ''; container.appendChild(img);
        } else {
          container.innerHTML = `<div class="error-msg">연결 실패<br><small>${cam.name}</small></div>`;
        }
      }
    });
    hlsInstances[cam.id] = hls;
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = hlsUrl;
    video.addEventListener('loadedmetadata', () => video.play().catch(() => {}));
  } else {
    container.innerHTML = `<div class="error-msg">HLS 미지원<br><small>${cam.name}</small></div>`;
    return;
  }
  container.innerHTML = '';
  container.appendChild(video);
}

/* ═══ Expand/collapse ═══ */
function toggleExpand(camId) {
  const card = document.getElementById('cam-' + camId);
  if (!card) return;
  if (card.classList.contains('expanded')) { closeExpanded(); }
  else {
    if (expandedCard) closeExpanded();
    card.classList.add('expanded'); expandedCard = card;
    document.getElementById('closeOverlay').classList.add('visible');
  }
}
function closeExpanded() {
  if (expandedCard) { expandedCard.classList.remove('expanded'); expandedCard = null; }
  document.getElementById('closeOverlay').classList.remove('visible');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeExpanded(); });

/* ═══ CCTV filter buttons ═══ */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.region;
    Object.keys(hlsInstances).forEach(k => { try { hlsInstances[k].destroy(); } catch(e){} delete hlsInstances[k]; });
    renderCCTV();
  });
});

/* ═══ CCTV layout buttons ═══ */
document.querySelectorAll('.layout-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const g = document.getElementById('grid-combined');
    if (g) g.className = 'grid layout-' + btn.dataset.layout;
  });
});

/* ═══ Init ═══ */
if (window.innerWidth <= 768) {
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
  const btn2 = document.querySelector('.layout-btn[data-layout="2x2"]');
  if (btn2) btn2.classList.add('active');
  document.getElementById('grid-combined').className = 'grid layout-2x2';
}
renderCCTV();
</script>
