<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>awesean-jeju-weather</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 100%);
    border-bottom: 2px solid #00b4d8;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 20px rgba(0,180,216,0.15);
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-icon {
    width: 36px; height: 36px;
    background: #00b4d8;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px; }
  .header h1 span { color: #00b4d8; }
  .header-right { display: flex; align-items: center; gap: 18px; font-size: 13px; color: #8899aa; }
  .live-dot {
    width: 8px; height: 8px; background: #ff4444; border-radius: 50%;
    display: inline-block; animation: pulse 1.5s infinite; margin-right: 5px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,68,68,0.7); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(255,68,68,0); }
  }
  #clock { font-family: 'Courier New', monospace; font-size: 15px; color: #00b4d8; font-weight: bold; }

  /* ── Tab Navigation (모바일 전용) ── */
  .tab-nav {
    display: none;
    background: #0d1b2a;
    padding: 0 24px;
    border-bottom: 1px solid #1a2a3a;
    position: sticky; top: 56px; z-index: 99;
  }
  .tab-btn {
    background: none; border: none; color: #667;
    padding: 10px 20px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    border-bottom: 2px solid transparent;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-btn:hover { color: #aab; }
  .tab-btn.active { color: #00b4d8; border-bottom-color: #00b4d8; }
  .tab-btn .tab-icon { font-size: 15px; }

  /* ── Compass Filter ── */
  .compass {
    position: fixed; bottom: 16px; right: 16px; z-index: 900;
    width: 150px; height: 150px;
  }
  .compass-ring {
    width: 100%; height: 100%; border-radius: 50%;
    background: rgba(10,14,23,0.92);
    border: 2px solid #1a2a3a;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,180,216,0.05);
    position: relative;
  }
  /* Tick marks */
  .compass-ring::before {
    content: ''; position: absolute; top: 0; left: 50%; width: 1px; height: 100%;
    background: linear-gradient(180deg, #1a2a3a 0%, transparent 15%, transparent 85%, #1a2a3a 100%);
    transform: translateX(-50%);
  }
  .compass-ring::after {
    content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px;
    background: linear-gradient(90deg, #1a2a3a 0%, transparent 15%, transparent 85%, #1a2a3a 100%);
    transform: translateY(-50%);
  }
  .filter-btn {
    position: absolute; background: transparent; border: none; color: #778;
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.25s; padding: 4px 6px; border-radius: 4px;
    white-space: nowrap; letter-spacing: 0.5px;
    transform: translate(-50%, -50%);
  }
  .filter-btn:hover { color: #00b4d8; text-shadow: 0 0 8px rgba(0,180,216,0.5); }
  .filter-btn.active { color: #00e5ff; text-shadow: 0 0 12px rgba(0,180,216,0.7); font-weight: 800; }
  /* Center button */
  .filter-btn[data-region="all"] {
    top: 50%; left: 50%; font-size: 12px;
    background: rgba(0,180,216,0.08); border-radius: 50%;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .filter-btn[data-region="all"].active {
    background: rgba(0,180,216,0.25);
    box-shadow: 0 0 15px rgba(0,180,216,0.3);
  }
  /* Cardinal positions */
  .filter-btn[data-region="제주 북부지역"] { top: 12%; left: 50%; }
  .filter-btn[data-region="제주 남부지역"] { top: 88%; left: 50%; }
  .filter-btn[data-region="제주 서부지역"] { top: 50%; left: 12%; }
  .filter-btn[data-region="제주 동부지역"] { top: 50%; left: 88%; }
  /* Outside positions */
  .filter-btn[data-region="한라산"] { top: -8%; left: 8%; font-size: 22px; }
  .filter-btn[data-region="해수욕장"] { top: -8%; left: 92%; font-size: 22px; }
  .filter-btn[data-region="한라산"].active,
  .filter-btn[data-region="해수욕장"].active { transform: translate(-50%, -50%) scale(1.2); }

  /* ── Floating Lever Panel ── */
  .lever-panel {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 900; display: flex; flex-direction: column; align-items: center; gap: 0;
  }
  .lever-label {
    font-size: 16px; font-weight: 800; color: #00b4d8; margin-bottom: 4px;
    text-shadow: 0 0 10px rgba(0,180,216,0.5);
    letter-spacing: 1px;
  }
  .lever-track {
    width: 120px; height: 44px; background: rgba(13,27,42,0.95);
    border: 1px solid #1a2a3a; border-radius: 22px;
    position: relative; touch-action: none;
    backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 10px;
  }
  .lever-arrow {
    font-size: 12px; color: #445; pointer-events: none; user-select: none;
  }
  .lever-knob {
    position: absolute; top: 50%; left: 50%; width: 32px; height: 32px;
    background: radial-gradient(circle at 40% 35%, #00d4ff, #0088aa);
    border: 2px solid #00e5ff; border-radius: 50%;
    transform: translate(-50%, -50%); cursor: grab;
    box-shadow: 0 0 12px rgba(0,180,216,0.4);
    transition: left 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 2;
  }
  .lever-knob.active { transition: none; box-shadow: 0 0 20px rgba(0,180,216,0.7); }

  /* ── Weather Section ── */
  .weather-area {
    border-bottom: 1px solid #1a2a3a;
  }
  .weather-section {
    padding: 4px;
    display: grid;
    gap: 4px;
  }
  .weather-section {
    grid-template-columns: 1fr 1fr 1fr;
    height: 35vh;
  }
  .weather-card {
    background: #111a28;
    border: 1px solid #1a2a3a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }
  .weather-card:hover { border-color: #00b4d8; }
  .weather-card-label {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%);
    padding: 10px 14px;
    z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
  }
  .weather-card-title {
    font-size: 13px; font-weight: 700; color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    display: flex; align-items: center; gap: 8px;
  }
  .weather-card-title .w-icon { font-size: 16px; }
  .weather-card-badge {
    font-size: 10px; color: #ffd700;
    background: rgba(255,215,0,0.12); padding: 2px 8px;
    border-radius: 10px; border: 1px solid rgba(255,215,0,0.3);
  }
  .weather-card iframe {
    width: 100%; height: 100%; border: none;
  }


  /* ── CCTV Grid ── */
  .grid {
    display: grid;
    gap: 4px;
    padding: 4px;
    grid-template-columns: repeat(4, 1fr);
  }
  .grid-cols-1 .cam-card.featured { grid-column: span 1; }

  /* ── Camera Card ── */
  .cam-card {
    background: #111a28;
    border: 1px solid #1a2a3a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .cam-card:hover { border-color: #00b4d8; box-shadow: 0 0 15px rgba(0,180,216,0.2); }
  .cam-card.featured {
    grid-column: span 2; grid-row: span 2;
    border-color: #00b4d8; box-shadow: 0 0 20px rgba(0,180,216,0.3);
  }
  .cam-card.featured .cam-media { aspect-ratio: 16/9; }
  .cam-card.featured .cam-name { font-size: 15px; }
  .cam-card.featured .cam-media img,
  .cam-card.featured .cam-media video { object-fit: contain; }
  .cam-card.expanded {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1000; border-radius: 0; border: none;
  }
  .cam-card.expanded .cam-media img,
  .cam-card.expanded .cam-media video { object-fit: contain; }
  .cam-label {
    position: absolute; top: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    padding: var(--cam-label-pad, 8px) 10px; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
  }
  .cam-name { font-size: var(--cam-name-size, 12px); font-weight: 600; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); transition: font-size 0.2s; }
  .cam-region {
    font-size: var(--cam-region-size, 10px); padding: 2px 8px; border-radius: 10px; transition: font-size 0.2s;
  }
  .hide-region .cam-region { display: none; }
  .hide-label .cam-label { padding: 4px 6px; }
  .hide-label .cam-name { font-size: 8px; }
  .cam-status {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    padding: 8px 10px; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
  }
  .cam-live {
    font-size: 10px; color: #ff4444; font-weight: bold;
    display: flex; align-items: center; gap: 4px;
  }
  .cam-live .dot { width: 6px; height: 6px; background: #ff4444; border-radius: 50%; animation: pulse 1.5s infinite; }
  .cam-source { font-size: 9px; color: #667; }
  .cam-media {
    width: 100%; aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center; background: #0a0e17;
  }
  .cam-media img, .cam-media video { width: 100%; height: 100%; object-fit: cover; }
  .cam-media .loading { color: #334; font-size: 12px; text-align: center; }
  .cam-media .error-msg { color: #664444; font-size: 11px; text-align: center; padding: 10px; }

  /* ── Fullscreen overlay ── */
  .close-overlay {
    position: fixed; top: 10px; right: 10px; z-index: 1001;
    background: rgba(0,0,0,0.8); border: 1px solid #00b4d8; color: #fff;
    padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px;
    display: none;
  }
  .close-overlay.visible { display: block; }
  .cam-card.expanded .cam-media { cursor: grab; overflow: hidden; aspect-ratio: auto; height: 100%; }
  .cam-card.expanded .cam-media.dragging { cursor: grabbing; }
  /* ── Zoom controls ── */
  .zoom-controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 1001; display: none; gap: 8px; align-items: center;
    background: rgba(0,0,0,0.8); border: 1px solid #334; border-radius: 8px; padding: 6px 12px;
  }
  .zoom-controls.visible { display: flex; }
  .zoom-btn {
    background: rgba(0,180,216,0.2); border: 1px solid #00b4d8; color: #fff;
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  .zoom-btn:hover { background: rgba(0,180,216,0.5); }
  .zoom-level { color: #aaa; font-size: 12px; min-width: 40px; text-align: center; }

  /* ═══════════════════════════════════════
     MOBILE RESPONSIVE (max-width: 768px)
     ═══════════════════════════════════════ */
  @media (max-width: 768px) {
    /* ── Header ── */
    .header { padding: 8px 12px; }
    .header-icon { width: 30px; height: 30px; font-size: 15px; }
    .header h1 { font-size: 14px; letter-spacing: 0; }
    .header-left { gap: 8px; }
    .header-right { gap: 10px; font-size: 11px; }
    #clock { font-size: 12px; }
    #cam-count { display: none; }

    /* ── Tabs: 모바일에서만 표시 ── */
    .tab-nav {
      display: flex;
      padding: 0 8px; top: 46px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .tab-btn { padding: 8px 12px; font-size: 12px; gap: 4px; white-space: nowrap; }
    .tab-btn .tab-icon { font-size: 13px; }

    /* ── 모바일 섹션 전환 ── */
    .weather-area { display: none; }
    .cctv-area { display: none; }
    .weather-area.mobile-active { display: block; }
    .cctv-area.mobile-active { display: block; }

    /* ── Compass filter ── */
    .compass { width: 120px; height: 120px; bottom: 12px; right: 10px; }
    .filter-btn { font-size: 10px; }
    .filter-btn[data-region="all"] { width: 34px; height: 34px; font-size: 10px; }
    .lever-panel { bottom: 12px; }
    .lever-track { width: 110px; height: 40px; }
    .lever-knob { width: 28px; height: 28px; }
    .lever-label { font-size: 14px; }

    /* ── Weather section: 모바일 1단 ── */
    .weather-section {
      grid-template-columns: 1fr;
      height: auto;
    }
    .weather-section .weather-card { min-height: 200px; }

    /* ── Camera card (기본 모바일) ── */
    .cam-card.featured { grid-column: span 2; grid-row: span 2; }
    .cam-label { padding: 10px 12px; }
    .cam-name { font-size: 13px; }
    .cam-region { font-size: 11px; padding: 3px 10px; }
    .cam-status { padding: 10px 12px; }
    .cam-live { font-size: 11px; }
    .cam-source { font-size: 10px; }

    /* ── Fullscreen close button ── */
    .close-overlay { padding: 10px 20px; font-size: 16px; }
    .zoom-controls { bottom: 16px; }
    .zoom-btn { width: 40px; height: 40px; font-size: 20px; }
  }

  /* (tablet adjustments now handled by joystick) */

  /* ═══════════════════════════════════════
     SMALL MOBILE (max-width: 480px)
     ═══════════════════════════════════════ */
  @media (max-width: 480px) {
    .header h1 { font-size: 13px; }
    .header-icon { width: 28px; height: 28px; font-size: 14px; border-radius: 6px; }
    .header-right > span:not(:first-child):not(#clock) { display: none; }
    .tab-btn { padding: 7px 10px; font-size: 11px; }
    .compass { width: 100px; height: 100px; bottom: 10px; right: 8px; }
    .filter-btn { font-size: 9px; }
    .filter-btn[data-region="all"] { width: 28px; height: 28px; font-size: 9px; }
    .weather-section .weather-card { min-height: 170px; }
  }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-left">
    <div class="header-icon">🌊</div>
    <h1><span>awesean</span>-jeju-weather</h1>
  </div>
  <div class="header-right">
    <span id="clock"></span>
    <span id="cam-count">26 카메라</span>
  </div>
</div>

<!-- ═══ TAB NAVIGATION (모바일 전용) ═══ -->
<div class="tab-nav">
  <button class="tab-btn active" data-tab="cctv">
    <span class="tab-icon">📡</span> CCTV
  </button>
  <button class="tab-btn" data-tab="weather">
    <span class="tab-icon">🌤</span> 날씨 지도
  </button>
</div>

<!-- ═══ WEATHER SECTION ═══ -->
<div class="weather-area" id="section-weather">
  <div class="weather-section" id="weather-grid">
    <div class="weather-card">
      <div class="weather-card-label">
        <span class="weather-card-title"><span class="w-icon">🛰</span> 위성 영상</span>
        <span class="weather-card-badge">Satellite</span>
      </div>
      <iframe src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=m/s&zoom=9&overlay=satellite&product=satellite&level=surface&lat=33.38&lon=126.55&message=true" loading="lazy"></iframe>
    </div>
    <div class="weather-card">
      <div class="weather-card-label">
        <span class="weather-card-title"><span class="w-icon">🌧</span> 강수량</span>
        <span class="weather-card-badge">Rain</span>
      </div>
      <iframe src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=m/s&zoom=9&overlay=rain&product=ecmwf&level=surface&lat=33.38&lon=126.55&message=true" loading="lazy"></iframe>
    </div>
    <div class="weather-card">
      <div class="weather-card-label">
        <span class="weather-card-title"><span class="w-icon">💨</span> 바람</span>
        <span class="weather-card-badge">Wind</span>
      </div>
      <iframe src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=m/s&zoom=9&overlay=wind&product=ecmwf&level=surface&lat=33.38&lon=126.55&message=true" loading="lazy"></iframe>
    </div>
  </div>
</div>

<!-- ═══ CCTV SECTION ═══ -->
<div class="cctv-area mobile-active" id="section-cctv">
  <div class="grid" id="grid-combined" style="grid-template-columns:repeat(4,1fr)"></div>
</div>

<!-- Compass Filter -->
<div class="compass" id="filterPanel">
  <div class="compass-ring">
    <button class="filter-btn active" data-region="all">전체</button>
    <button class="filter-btn" data-region="제주 북부지역">북부</button>
    <button class="filter-btn" data-region="제주 남부지역">남부</button>
    <button class="filter-btn" data-region="제주 동부지역">동부</button>
    <button class="filter-btn" data-region="제주 서부지역">서부</button>
    <button class="filter-btn" data-region="한라산">🏔</button>
    <button class="filter-btn" data-region="해수욕장">🏖</button>
  </div>
</div>

<button class="close-overlay" id="closeOverlay" onclick="closeExpanded()">✕ 닫기 (ESC)</button>

<!-- Floating Lever Panel -->
<div class="lever-panel" id="leverPanel">
  <span class="lever-label" id="colLabel">4단</span>
  <div class="lever-track" id="leverTrack">
    <span class="lever-arrow">◀</span>
    <div class="lever-knob" id="leverKnob"></div>
    <span class="lever-arrow">▶</span>
  </div>
</div>
<div class="zoom-controls" id="zoomControls">
  <button class="zoom-btn" onclick="zoomAction('out')">−</button>
  <span class="zoom-level" id="zoomLevel">1.0x</span>
  <button class="zoom-btn" onclick="zoomAction('in')">+</button>
  <button class="zoom-btn" onclick="zoomAction('reset')" style="font-size:12px;width:auto;padding:0 12px;border-radius:4px;">리셋</button>
</div>

const regionColors = {
  "제주 북부지역": "#00b4d8",
  "제주 남부지역": "#48bb78",
  "제주 동부지역": "#ed8936",

  "한라산": "#f56565"
};

let currentFilter = "all";
let expandedCard = null;
const hlsInstances = {};

/* ═══ Clock ═══ */
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

/* ═══ Mobile tab switching ═══ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    const weatherEl = document.getElementById('section-weather');
    const cctvEl = document.getElementById('section-cctv');
    weatherEl.classList.toggle('mobile-active', tab === 'weather');
    cctvEl.classList.toggle('mobile-active', tab === 'cctv');
  });
});

/* ═══ Render CCTV into a grid container ═══ */
function renderCameras(gridEl, cameraList) {
  gridEl.innerHTML = '';
  cameraList.forEach(cam => {
    const card = document.createElement('div');
    card.className = 'cam-card';
    card.id = 'cam-' + cam.id;
    const color = regionColors[cam.region] || '#00b4d8';
    card.innerHTML = `
      <div class="cam-label">
        <span class="cam-name">${cam.name}</span>
        <span class="cam-region" style="color:${color};background:${color}22;border:1px solid ${color}44">${cam.region.replace(/제주\s*/,'').replace(/지역/,'')}</span>
      </div>
      <div class="cam-media" id="media-${cam.id}">
        <div class="loading">연결 중...</div>
      </div>
    `;
    let clickTimer = null;
    card.addEventListener('click', (e) => {
      if (card.classList.contains('expanded')) return;
      if (clickTimer) return;
      clickTimer = setTimeout(() => { clickTimer = null; toggleFeatured(cam.id); }, 250);
    });
    card.addEventListener('dblclick', (e) => {
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      e.preventDefault(); toggleExpand(cam.id);
    });
    // Mobile: double-tap to fullscreen, single-tap to featured
    let tapTimeout;
    card.addEventListener('touchend', (e) => {
      if (tapTimeout) { clearTimeout(tapTimeout); tapTimeout = null; e.preventDefault(); toggleExpand(cam.id); }
      else { tapTimeout = setTimeout(() => { tapTimeout = null; }, 300); }
    });
    gridEl.appendChild(card);
    setTimeout(() => loadStream(cam), 100);
  });
}

function renderCCTV() {
  const grid = document.getElementById('grid-combined');
  const filtered = currentFilter === 'all' ? cameras : currentFilter === '해수욕장' ? cameras.filter(c => c.source === '해수욕장') : cameras.filter(c => c.region === currentFilter);
  renderCameras(grid, filtered);
  document.getElementById('cam-count').textContent = filtered.length + ' 카메라';
}

/* ═══ Stream loading ═══ */
function loadStream(cam) {
  const container = document.getElementById('media-' + cam.id);
  if (!container) return;
  if (cam.type === 'mjpg') {
    const img = document.createElement('img');
    img.src = cam.url;
    img.alt = cam.name;
    img.onerror = () => { if (cam.hls) loadHLS(cam, container); else container.innerHTML = `<div class="error-msg">연결 실패<br><small>${cam.name}</small></div>`; };
    container.innerHTML = '';
    container.appendChild(img);
  } else {
    loadHLS(cam, container);
  }
}

function loadHLS(cam, container) {
  const video = document.createElement('video');
  video.muted = true; video.autoplay = true; video.playsInline = true;
  const hlsUrl = cam.hls || cam.url;

  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true, lowLatencyMode: true, maxBufferLength: 10, maxMaxBufferLength: 30 });
    hls.loadSource(hlsUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        if (hlsUrl === cam.hls && cam.url !== cam.hls) {
          hls.destroy();
          const hls2 = new Hls({ enableWorker: true });
          hls2.loadSource(cam.url); hls2.attachMedia(video);
          hls2.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
          hls2.on(Hls.Events.ERROR, () => { container.innerHTML = `<div class="error-msg">연결 실패<br><small>${cam.name}</small></div>`; });
          hlsInstances[cam.id] = hls2;
        } else if (cam.url.includes('axis-cgi')) {
          const img = document.createElement('img'); img.src = cam.url; img.alt = cam.name;
          container.innerHTML = ''; container.appendChild(img);
        } else {
          container.innerHTML = `<div class="error-msg">연결 실패<br><small>${cam.name}</small></div>`;
        }
      }
    });
    hlsInstances[cam.id] = hls;
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = hlsUrl;
    video.addEventListener('loadedmetadata', () => video.play().catch(() => {}));
  } else {
    container.innerHTML = `<div class="error-msg">HLS 미지원<br><small>${cam.name}</small></div>`;
    return;
  }
  container.innerHTML = '';
  container.appendChild(video);
}

/* ═══ Featured (main video in grid) ═══ */
let featuredCard = null;
function toggleFeatured(camId) {
  const card = document.getElementById('cam-' + camId);
  if (!card) return;
  if (card.classList.contains('featured')) {
    card.classList.remove('featured');
    featuredCard = null;
  } else {
    if (featuredCard) featuredCard.classList.remove('featured');
    card.classList.add('featured');
    featuredCard = card;
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

/* ═══ Expand/collapse + Zoom ═══ */
let zoomScale = 1, zoomX = 0, zoomY = 0;
let isDragging = false, dragStartX = 0, dragStartY = 0, dragStartZX = 0, dragStartZY = 0;

function applyZoom() {
  if (!expandedCard) return;
  const media = expandedCard.querySelector('.cam-media');
  const el = media.querySelector('img, video');
  if (!el) return;
  el.style.transform = `scale(${zoomScale}) translate(${zoomX}px, ${zoomY}px)`;
  el.style.transformOrigin = 'center center';
  document.getElementById('zoomLevel').textContent = zoomScale.toFixed(1) + 'x';
}

function resetZoom() {
  zoomScale = 1; zoomX = 0; zoomY = 0;
  if (expandedCard) {
    const el = expandedCard.querySelector('.cam-media img, .cam-media video');
    if (el) { el.style.transform = ''; el.style.transformOrigin = ''; }
  }
}

function zoomAction(type) {
  if (type === 'in' && zoomScale < 5) zoomScale = Math.round((zoomScale + 0.5) * 10) / 10;
  else if (type === 'out' && zoomScale > 1) { zoomScale = Math.round((zoomScale - 0.5) * 10) / 10; if (zoomScale <= 1) { zoomScale = 1; zoomX = 0; zoomY = 0; } }
  else if (type === 'reset') { zoomScale = 1; zoomX = 0; zoomY = 0; }
  applyZoom();
}

function toggleExpand(camId) {
  const card = document.getElementById('cam-' + camId);
  if (!card) return;
  if (card.classList.contains('expanded')) { closeExpanded(); }
  else {
    if (expandedCard) closeExpanded();
    card.classList.add('expanded'); expandedCard = card;
    document.getElementById('closeOverlay').classList.add('visible');
    document.getElementById('zoomControls').classList.add('visible');
    document.getElementById('leverPanel').style.display = 'none';
    document.getElementById('filterPanel').style.display = 'none';
    setupZoomListeners(card);
  }
}
function closeExpanded() {
  resetZoom();
  if (expandedCard) { expandedCard.classList.remove('expanded'); expandedCard = null; }
  document.getElementById('closeOverlay').classList.remove('visible');
  document.getElementById('zoomControls').classList.remove('visible');
  document.getElementById('leverPanel').style.display = '';
  document.getElementById('filterPanel').style.display = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeExpanded(); });

/* ── Zoom: wheel + drag + pinch ── */
function setupZoomListeners(card) {
  const media = card.querySelector('.cam-media');
  /* Mouse wheel zoom */
  media.onwheel = (e) => {
    e.preventDefault();
    if (e.deltaY < 0 && zoomScale < 5) zoomScale = Math.round((zoomScale + 0.25) * 100) / 100;
    else if (e.deltaY > 0 && zoomScale > 1) { zoomScale = Math.round((zoomScale - 0.25) * 100) / 100; if (zoomScale <= 1) { zoomScale = 1; zoomX = 0; zoomY = 0; } }
    applyZoom();
  };
  /* Mouse drag pan */
  media.onmousedown = (e) => {
    if (zoomScale <= 1) return;
    isDragging = true; media.classList.add('dragging');
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragStartZX = zoomX; dragStartZY = zoomY;
    e.preventDefault();
  };
  document.onmousemove = (e) => {
    if (!isDragging) return;
    zoomX = dragStartZX + (e.clientX - dragStartX) / zoomScale;
    zoomY = dragStartZY + (e.clientY - dragStartY) / zoomScale;
    applyZoom();
  };
  document.onmouseup = () => { isDragging = false; if (media) media.classList.remove('dragging'); };
  /* Touch pinch zoom + pan */
  let lastTouchDist = 0, lastTouchX = 0, lastTouchY = 0;
  media.ontouchmove = (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (lastTouchDist > 0) {
        const delta = (dist - lastTouchDist) * 0.01;
        zoomScale = Math.max(1, Math.min(5, zoomScale + delta));
        if (zoomScale <= 1) { zoomX = 0; zoomY = 0; }
      }
      lastTouchDist = dist;
      applyZoom();
    } else if (e.touches.length === 1 && zoomScale > 1) {
      e.preventDefault();
      const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
      if (lastTouchX > 0) {
        zoomX += (tx - lastTouchX) / zoomScale;
        zoomY += (ty - lastTouchY) / zoomScale;
        applyZoom();
      }
      lastTouchX = tx; lastTouchY = ty;
    }
  };
  media.ontouchend = () => { lastTouchDist = 0; lastTouchX = 0; lastTouchY = 0; };
}

/* ═══ CCTV filter buttons ═══ */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.region;
    Object.keys(hlsInstances).forEach(k => { try { hlsInstances[k].destroy(); } catch(e){} delete hlsInstances[k]; });
    renderCCTV();
  });
});

/* ═══ Spring-back Lever Control ═══ */
let currentCols = window.innerWidth <= 768 ? 2 : 4;
const MIN_COLS = 1, MAX_COLS = 6;

function setColumns(n) {
  currentCols = Math.max(MIN_COLS, Math.min(MAX_COLS, n));
  const grid = document.getElementById('grid-combined');
  grid.style.gridTemplateColumns = `repeat(${currentCols}, 1fr)`;
  document.getElementById('colLabel').textContent = currentCols + '단';
  grid.classList.toggle('grid-cols-1', currentCols === 1);
  /* Scale text with column count */
  const sizes = { 1:[16,12,10], 2:[13,10,8], 3:[11,9,7], 4:[11,9,7], 5:[9,8,0], 6:[8,0,0] };
  const [nameS, regionS, padS] = sizes[currentCols] || [11,9,8];
  grid.style.setProperty('--cam-name-size', nameS + 'px');
  grid.style.setProperty('--cam-region-size', regionS + 'px');
  grid.style.setProperty('--cam-label-pad', (padS > 0 ? padS : 4) + 'px');
  grid.classList.toggle('hide-region', regionS === 0);
  grid.classList.toggle('hide-label', nameS <= 8 && currentCols >= 6);
}

(function() {
  const knob = document.getElementById('leverKnob');
  const track = document.getElementById('leverTrack');
  let dragging = false, startX = 0, triggered = false;
  const THRESHOLD = 30; /* px to trigger column change */

  function snapBack() {
    knob.classList.remove('active');
    knob.style.left = '50%';
  }

  function handleDrag(clientX) {
    const rect = track.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    const dx = clientX - center;
    /* Clamp knob movement within track */
    const maxDx = rect.width / 2 - 20;
    const clampedDx = Math.max(-maxDx, Math.min(maxDx, dx));
    knob.style.left = `calc(50% + ${clampedDx}px)`;

    if (!triggered && Math.abs(dx) > THRESHOLD) {
      triggered = true;
      if (dx < 0 && currentCols > MIN_COLS) setColumns(currentCols - 1);
      else if (dx > 0 && currentCols < MAX_COLS) setColumns(currentCols + 1);
    }
  }

  function endDrag() {
    if (!dragging) return;
    dragging = false; triggered = false;
    snapBack();
  }

  /* Mouse */
  knob.addEventListener('mousedown', (e) => {
    dragging = true; triggered = false; startX = e.clientX;
    knob.classList.add('active'); e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => { if (dragging) handleDrag(e.clientX); });
  document.addEventListener('mouseup', endDrag);

  /* Touch */
  knob.addEventListener('touchstart', (e) => {
    dragging = true; triggered = false; startX = e.touches[0].clientX;
    knob.classList.add('active'); e.preventDefault();
  });
  document.addEventListener('touchmove', (e) => { if (dragging) handleDrag(e.touches[0].clientX); });
  document.addEventListener('touchend', endDrag);

  /* Click left/right side of track */
  track.addEventListener('click', (e) => {
    if (e.target === knob) return;
    const rect = track.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    if (e.clientX < center && currentCols > MIN_COLS) setColumns(currentCols - 1);
    else if (e.clientX > center && currentCols < MAX_COLS) setColumns(currentCols + 1);
  });
})();

/* ═══ Init ═══ */
setColumns(currentCols);
renderCCTV();
